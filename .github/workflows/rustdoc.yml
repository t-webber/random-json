name: Documentation

on:
  push:
    paths:
      - '**/*.rs'
      - '.github/workflows/rustdoc.yml'
      - '.cargo/**'
  pull_request:
    paths:
      - '**/*.rs'
      - '.github/workflows/rustdoc.yml'
      - '.cargo/**'

env:
    CARGO_TERM_COLOR: always

jobs:
    doc:
        runs-on: ubuntu-latest
        strategy:
          matrix:
            rust: [stable, nightly]

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install Rust
              uses: actions-rs/toolchain@v1
              with:
                toolchain: ${{ matrix.rust }}
                override: true

            - name: Check documentation
              run: RUSTDOCFLAGS="-D warnings" cargo doc --document-private-items --all --verbose --release --no-deps
